name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e-test:
    runs-on: ubuntu-latest
    needs: [build]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report and test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 30
          if-no-files-found: ignore
      - name: E2E report — view locally with show-report
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## E2E Playwright report

          1. Open this job in the Actions UI and download the **`e2e-playwright-artifacts`** ZIP from **Artifacts**.
          2. Extract the archive. You should see **`playwright-report/`** and **`test-results/`** (videos, traces) at the top level.
          3. From the directory that contains `playwright-report`, run:

          ```bash
          npx playwright show-report playwright-report
          ```

          Traces and videos in `test-results/` are linked from the HTML report; keep both folders next to each other after extract.

          ### Public HTML report (GitHub Pages)

          For pushes and same-repo PRs, the **deploy-e2e-report** job publishes this run under `reports/<run-id>/` on the **`gh-pages`** branch. Open that job’s log **Summary** for the browseable URL.

          First time only: **Settings → Pages → Build and deployment → Branch** → select **`gh-pages`** and **`/`** (root), then save.

          Reports are world-readable on a public repo and may include screenshots, URLs, or other test data.
          EOF

  deploy-e2e-report:
    name: Deploy E2E report to GitHub Pages
    runs-on: ubuntu-latest
    needs: [e2e-test]
    if: |
      always() &&
      needs.e2e-test.result != 'cancelled' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    concurrency:
      group: gh-pages-playwright-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Download e2e artifacts
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: e2e-playwright-artifacts
          path: e2e-artifacts

      - name: Deploy Playwright report to gh-pages
        id: pages
        if: steps.download.outcome == 'success'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: e2e-artifacts
          target-folder: reports/${{ github.run_id }}-${{ github.run_attempt }}
          clean: false

      - name: Add report URL to job summary
        if: steps.download.outcome == 'success' && steps.pages.outcome == 'success'
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_id }}-${{ github.run_attempt }}/playwright-report/"
          {
            echo "## Playwright report on GitHub Pages"
            echo ""
            echo "Open the HTML report: [$REPORT_URL]($REPORT_URL)"
            echo ""
            echo "Traces and videos stay under the sibling \`test-results/\` path on the same run folder if you need direct file links."
          } >> "$GITHUB_STEP_SUMMARY"
